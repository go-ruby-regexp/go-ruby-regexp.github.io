baseURL = "https://go-onigmo.github.io/"
title = "go-onigmo"
disableKinds = ["taxonomy", "term", "RSS", "sitemap", "404"]

[markup.goldmark.renderer]
  unsafe = true

[[params.phases]]
  name = "Phase 0 — Scanner, parser & VM"
  status = "ready"
  blurb = "Onigmo syntax scanner + parser → AST, a bytecode compiler, and a backtracking VM: literals, classes, `. * + ? {m,n}`, groups, alternation, anchors, with captures."
[[params.phases]]
  name = "Phase 1 — Groups & quantifier modes"
  status = "ready"
  blurb = "Named groups `(?<name>…)`, backreferences `\\1` / `\\k<name>`, and every quantifier mode — greedy, lazy `*? +? ??`, possessive `*+ ++ ?+`, and atomic groups `(?>…)`."
[[params.phases]]
  name = "Phase 2 — Lookaround & calls"
  status = "ready"
  blurb = "Lookahead `(?=…)` `(?!…)`, fixed/bounded-width lookbehind `(?<=…)` `(?<!…)`, the `\\G` anchor, and recursive subexpression calls `\\g<name>` / `\\g<0>`."
[[params.phases]]
  name = "Phase 3 — Unicode & encodings"
  status = "ready"
  blurb = "Unicode properties `\\p{…}`, POSIX bracket classes `[[:alpha:]]`, `\\h` / `\\H`, `\\R`, rune-level `/i` case folding, inline flags `(?imx)`, and UTF-8 / ASCII-8BIT multi-encoding with multibyte class members `[é]` / `[à-ï]`."
[[params.phases]]
  name = "Phase 4 — ReDoS hardening & optimizer"
  status = "ready"
  blurb = "`(pc, sp)` memoization, step budget, recursion cap and a wall-clock `WithTimeout`; a start-position / interior-literal prefilter (up to ~210× faster); a benchmark suite."
[[params.phases]]
  name = "Phase 5 — Ruby surface"
  status = "planned"
  blurb = "Downstream, not part of this engine module: the full Ruby `Regexp` / `MatchData` surface and replacement DSL live in the go-embedded-ruby adapter that consumes this engine."
